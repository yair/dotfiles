# ~/.config/tmux/tmux.conf
#
# Hand-rolled tmux config replicating the screen/zellij workflow.
# Catppuccin Mocha status line, ported from
# ~/w/zhizi/docs/intent-archive/zellij-screen-style-layout.kdl.
#
# Acceptance gate (must work over SSH): Claude Code TUI in a pane, detach,
# disconnect, reattach -> editor + Claude state intact.

# =============================================================================
# General
# =============================================================================

# Prefix: Ctrl-a (single key; replaces default Ctrl-b).
# Press twice (C-a C-a) to send a literal C-a to the running program
# (e.g. emacs/readline beginning-of-line).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Snappy escape (the default 500ms breaks vim and feels sluggish in TUIs).
set -s escape-time 0

# Forward terminal focus in/out events to the program in the active pane.
# Claude Code uses them (am I being looked at?); vim/nvim use them for
# autoread (reload a file changed on disk when you refocus the window).
set -g focus-events on

# Large scrollback safety net. Real "old command" recall is shell history.
set -g history-limit 200000

# Truecolor + sane terminfo. tmux-256color is the modern default; truecolor
# advertised via terminal-features for the terminals we use.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",alacritty:RGB"
set -as terminal-features ",xterm-256color:RGB"

# Let applications pass escape sequences straight through to the outer terminal
# -- e.g. the OSC 777 desktop-notification escape a remote Claude Code hook
# emits, which then rides ssh to the local ghostty. Off by default (safety).
set -g allow-passthrough on

# Terminal emulator (alacritty) owns selection. Vim/nvim get mouse= off
# separately so clicks never reposition cursor in apps.
set -g mouse off

# Window/pane numbering starts at 1 (matches prefix-digit jump keys).
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Vim-style copy mode (we use vim).
set-window-option -g mode-keys vi

# =============================================================================
# Window / pane auto-naming
# =============================================================================

# Native equivalent of the screen `shelltitle` / zellij DEBUG-trap mechanism.
# Window name follows the running command; reverts to bash/zsh when idle.
set -g automatic-rename on
set -g automatic-rename-format '#{pane_current_command}'

# Terminal window title (visible outside tmux too).
set -g set-titles on
set -g set-titles-string '#h:#S #I:#W'

# =============================================================================
# Keybindings (prefix-gated only -- no `bind -n` root bindings that could
# shadow Claude Code's keys)
# =============================================================================

# Reload config without restarting tmux.
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# Next window: prefix-n (tmux default) plus prefix-Space. Windows are the unit
# we work in. (prefix-Space defaults to next-layout, which we don't use.)
bind Space next-window

# --- Panes / splits: currently UNUSED ---------------------------------------
# Workflow is full-window only -- no splits, no layouts (window management is
# xmonad's job at the WM level). These bindings are kept dormant for if/when
# that changes; remove them if you want prefix-|/-/h/j/k/l back for something.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# =============================================================================
# Status line (Catppuccin Mocha; ported from screen-style.kdl)
# =============================================================================

set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Base: mantle background, subtext0 default fg.
set -g status-style "bg=#181825,fg=#a6adc8"

# Pane borders: subtle inactive, green active (matches the zellij feel).
set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#a6e3a1"

# Message style (e.g. reload-config notification).
set -g message-style "bg=#181825,fg=#a6e3a1"

# --- Left: /host/session 🐇🐇 [PREFIX|COPY when active] -----------------------
set -g status-left-length 80
set -g status-left "#[fg=#fa83b7]/#h/#[fg=#89b4fa,bold]#S#[default] 🐇🐇 #{?client_prefix,#[fg=#181825#,bg=#fab387#,bold] PREFIX #[default] ,}#{?pane_in_mode,#[fg=#181825#,bg=#cba6f7#,bold] COPY #[default] ,}"

# --- Window list: bold-green-underscored active, dim inactive ----------------
set -g window-status-format         "#[fg=#6c7086] #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-current-format "#[fg=#a6e3a1,bold,underscore] #I:#W#{?window_flags,#{window_flags}, } "
set -g window-status-separator ""

# --- Right: 🌿branch  🌋load  YY-MM-DD HH:MM:SS ------------------------------
# Git branch is computed by a helper script (the inline shell-variable form
# fights tmux's pre-expansion of $vars in double-quoted option values).
# The script prints nothing when not in a git repo -> no orphan leaf icon.
set -g status-right-length 80
set -g status-right "#[fg=#88ee88]#(~/.config/tmux/git-branch.sh '#{pane_current_path}')#[fg=#fab387]🌋#(cut -d' ' -f1 /proc/loadavg) #[fg=#f9e2af] %y-%m-%d %H:%M:%S "
